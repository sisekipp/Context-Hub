syntax = "proto3";

package context_hub.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message Workspace {
  string id = 1;
  string name = 2;
  string slug = 3;
}

message GetWorkspaceRequest { string id = 1; }
message ListWorkspacesResponse { repeated Workspace workspaces = 1; }

service WorkspaceService {
  rpc GetWorkspace(GetWorkspaceRequest) returns (Workspace);
  rpc ListWorkspaces(google.protobuf.Empty) returns (ListWorkspacesResponse);
}

message OntologyDraft {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  string slug = 4;
  uint64 revision = 5;
  string definition_json = 6;
  string layout_json = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message Ontology {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  string slug = 4;
  string active_version_id = 5;
  uint64 revision = 6;
}

message OntologyVersion {
  string id = 1;
  string ontology_id = 2;
  uint64 version = 3;
  string definition_json = 4;
  string checksum = 5;
  bool active = 6;
  google.protobuf.Timestamp published_at = 7;
}

message GetOntologyDraftRequest { string id = 1; }
message SaveOntologyDraftRequest {
  OntologyDraft draft = 1;
  uint64 expected_revision = 2;
}
message ValidateOntologyRequest { string definition_json = 1; }
message ValidationIssue {
  string path = 1;
  string code = 2;
  string message = 3;
}
message ValidateOntologyResponse {
  bool valid = 1;
  repeated ValidationIssue issues = 2;
}
message PublishOntologyRequest {
  string ontology_id = 1;
  uint64 expected_revision = 2;
}
message ListOntologyVersionsRequest { string ontology_id = 1; }
message ListOntologyVersionsResponse { repeated OntologyVersion versions = 1; }
message ListOntologiesRequest { string workspace_id = 1; }
message ListOntologiesResponse { repeated Ontology ontologies = 1; }
message CreateOntologyRequest {
  string workspace_id = 1;
  string name = 2;
  string slug = 3;
}

service OntologyService {
  rpc Create(CreateOntologyRequest) returns (Ontology);
  rpc List(ListOntologiesRequest) returns (ListOntologiesResponse);
  rpc GetDraft(GetOntologyDraftRequest) returns (OntologyDraft);
  rpc SaveDraft(SaveOntologyDraftRequest) returns (OntologyDraft);
  rpc Validate(ValidateOntologyRequest) returns (ValidateOntologyResponse);
  rpc Publish(PublishOntologyRequest) returns (OntologyVersion);
  rpc ListVersions(ListOntologyVersionsRequest) returns (ListOntologyVersionsResponse);
}

message ExecuteFunctionRequest {
  string workspace_id = 1;
  string ontology_version_id = 2;
  string function_api_name = 3;
  string arguments_json = 4;
}

message ExecuteFunctionResponse {
  string result_json = 1;
  string executor = 2;
  uint64 duration_millis = 3;
  string execution_id = 4;
}

message FunctionArtifact {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  string file_name = 4;
  string artifact_uri = 5;
  uint64 size_bytes = 6;
  string sha256 = 7;
  google.protobuf.Timestamp created_at = 8;
}
message UploadFunctionArtifactRequest {
  string workspace_id = 1;
  string name = 2;
  string file_name = 3;
  bytes content = 4;
}
message ListFunctionArtifactsRequest { string workspace_id = 1; }
message ListFunctionArtifactsResponse { repeated FunctionArtifact artifacts = 1; }
message DeleteFunctionArtifactRequest {
  string workspace_id = 1;
  string id = 2;
}

message TestExternalFunctionProviderRequest {
  string workspace_id = 1;
  string endpoint = 2;
  string method = 3;
  string function_api_name = 4;
  string arguments_json = 5;
}
message TestExternalFunctionProviderResponse {
  string result_json = 1;
  uint64 duration_millis = 2;
}

enum FunctionExecutionState {
  FUNCTION_EXECUTION_STATE_UNSPECIFIED = 0;
  FUNCTION_EXECUTION_STATE_SUCCEEDED = 1;
  FUNCTION_EXECUTION_STATE_FAILED = 2;
}
message FunctionExecution {
  string id = 1;
  string workspace_id = 2;
  string ontology_version_id = 3;
  string function_api_name = 4;
  string executor = 5;
  FunctionExecutionState state = 6;
  string arguments_json = 7;
  string result_json = 8;
  string error = 9;
  uint64 duration_millis = 10;
  google.protobuf.Timestamp executed_at = 11;
}
message ListFunctionExecutionsRequest {
  string workspace_id = 1;
  string ontology_version_id = 2;
  string function_api_name = 3;
  uint32 limit = 4;
}
message ListFunctionExecutionsResponse { repeated FunctionExecution executions = 1; }

// Standard envelope implemented by remote ContextHub function providers. The provider is
// responsible only for computation; ContextHub validates both input and output types.
message ExternalFunctionRequest {
  string function_api_name = 1;
  string arguments_json = 2;
}

message ExternalFunctionResponse { string result_json = 1; }

service FunctionService {
  rpc Execute(ExecuteFunctionRequest) returns (ExecuteFunctionResponse);
  rpc UploadArtifact(UploadFunctionArtifactRequest) returns (FunctionArtifact);
  rpc ListArtifacts(ListFunctionArtifactsRequest) returns (ListFunctionArtifactsResponse);
  rpc DeleteArtifact(DeleteFunctionArtifactRequest) returns (google.protobuf.Empty);
  rpc TestExternalProvider(TestExternalFunctionProviderRequest) returns (TestExternalFunctionProviderResponse);
  rpc ListExecutions(ListFunctionExecutionsRequest) returns (ListFunctionExecutionsResponse);
}

service ExternalFunctionService {
  rpc Invoke(ExternalFunctionRequest) returns (ExternalFunctionResponse);
}

enum DataSourceKind {
  DATA_SOURCE_KIND_UNSPECIFIED = 0;
  DATA_SOURCE_KIND_UPLOAD = 1;
  DATA_SOURCE_KIND_REST = 2;
  DATA_SOURCE_KIND_GRAPHQL = 3;
}

message DataSource {
  reserved 6;
  reserved "mapping_plan_json";
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  DataSourceKind kind = 4;
  string configuration_json = 5;
}
message ListDataSourcesRequest { string workspace_id = 1; }
message ListDataSourcesResponse { repeated DataSource data_sources = 1; }
message SaveDataSourceRequest { DataSource data_source = 1; }
message GetDataSourceUsageRequest { string id = 1; }
message DataSourceUsage {
  string ontology_id = 1;
  string ontology_name = 2;
  string mapping_id = 3;
  string mapping_name = 4;
}
message GetDataSourceUsageResponse {
  DataSource data_source = 1;
  repeated DataSourceUsage usages = 2;
}
message DeleteDataSourceRequest { string id = 1; }

enum SourceFileFormat {
  SOURCE_FILE_FORMAT_UNSPECIFIED = 0;
  SOURCE_FILE_FORMAT_JSON = 1;
  SOURCE_FILE_FORMAT_NDJSON = 2;
  SOURCE_FILE_FORMAT_CSV = 3;
  SOURCE_FILE_FORMAT_PARQUET = 4;
}
message UploadDataSourceRequest {
  string workspace_id = 1;
  string name = 2;
  string file_name = 3;
  SourceFileFormat format = 4;
  bytes content = 5;
}
message UploadDataSourceResponse {
  DataSource data_source = 1;
  string object_key = 2;
  uint64 size_bytes = 3;
  string sha256 = 4;
}
message GetUploadDataSourceRequest { string id = 1; }
message GetUploadDataSourceResponse {
  DataSource data_source = 1;
  string file_name = 2;
  SourceFileFormat format = 3;
  bytes content = 4;
  string sha256 = 5;
}
message PreviewDataSourceRequest { string id = 1; }
message PreviewDataSourceResponse {
  DataSource data_source = 1;
  bytes content = 2;
  uint64 record_count = 3;
}

message OntologyDataMapping {
  string id = 1;
  string workspace_id = 2;
  string ontology_id = 3;
  string data_source_id = 4;
  string name = 5;
  string mapping_plan_json = 6;
  uint64 revision = 7;
}
message SaveOntologyDataMappingRequest { OntologyDataMapping mapping = 1; }
message ListOntologyDataMappingsRequest {
  string workspace_id = 1;
  string ontology_id = 2;
}
message ListOntologyDataMappingsResponse { repeated OntologyDataMapping mappings = 1; }

service DataSourceService {
  rpc Save(SaveDataSourceRequest) returns (DataSource);
  rpc GetUsage(GetDataSourceUsageRequest) returns (GetDataSourceUsageResponse);
  rpc Delete(DeleteDataSourceRequest) returns (google.protobuf.Empty);
  rpc Upload(UploadDataSourceRequest) returns (UploadDataSourceResponse);
  rpc GetUpload(GetUploadDataSourceRequest) returns (GetUploadDataSourceResponse);
  rpc Preview(PreviewDataSourceRequest) returns (PreviewDataSourceResponse);
  rpc List(ListDataSourcesRequest) returns (ListDataSourcesResponse);
  rpc SaveMapping(SaveOntologyDataMappingRequest) returns (OntologyDataMapping);
  rpc ListMappings(ListOntologyDataMappingsRequest) returns (ListOntologyDataMappingsResponse);
}

enum IngestionState {
  INGESTION_STATE_UNSPECIFIED = 0;
  INGESTION_STATE_QUEUED = 1;
  INGESTION_STATE_RUNNING = 2;
  INGESTION_STATE_SUCCEEDED = 3;
  INGESTION_STATE_FAILED = 4;
  INGESTION_STATE_CANCELLED = 5;
}

message IngestionJob {
  string id = 1;
  string data_source_id = 2;
  IngestionState state = 3;
  uint64 rows_read = 4;
  uint64 nodes_written = 5;
  uint64 edges_written = 6;
  uint64 rows_rejected = 7;
  string error = 8;
  string ontology_mapping_id = 9;
  string ontology_version_id = 10;
  string workspace_id = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp started_at = 13;
  google.protobuf.Timestamp completed_at = 14;
}
message StartIngestionRequest {
  string data_source_id = 1;
  string ontology_mapping_id = 2;
  string ontology_version_id = 3;
}
message GetIngestionJobRequest { string id = 1; }
message ListIngestionJobsRequest {
  string workspace_id = 1;
  string ontology_id = 2;
  uint32 limit = 3;
}
message ListIngestionJobsResponse { repeated IngestionJob jobs = 1; }
message RetryIngestionJobRequest { string id = 1; }
message IngestionEvent {
  string job_id = 1;
  string data_source_id = 2;
  string event_type = 3;
  uint64 row_number = 4;
  string object_type = 5;
  string external_id = 6;
  string message = 7;
  string details_json = 8;
  google.protobuf.Timestamp occurred_at = 9;
}
message ListIngestionEventsRequest { string job_id = 1; uint32 limit = 2; }
message ListIngestionEventsResponse { repeated IngestionEvent events = 1; }

// Internal worker boundary: records have already been validated and transformed by the
// MappingPlan/DataFusion pipeline before this bounded graph batch is persisted.
message ImportGraphRequest {
  string data_source_id = 1;
  string ontology_mapping_id = 2;
  string ontology_version_id = 3;
  repeated GraphNode nodes = 4;
  repeated GraphEdge edges = 5;
}

service IngestionService {
  rpc Start(StartIngestionRequest) returns (IngestionJob);
  rpc ImportGraph(ImportGraphRequest) returns (IngestionJob);
  rpc GetJob(GetIngestionJobRequest) returns (IngestionJob);
  rpc ListJobs(ListIngestionJobsRequest) returns (ListIngestionJobsResponse);
  rpc Retry(RetryIngestionJobRequest) returns (IngestionJob);
  rpc ListEvents(ListIngestionEventsRequest) returns (ListIngestionEventsResponse);
}

enum FilterOperator {
  FILTER_OPERATOR_UNSPECIFIED = 0;
  FILTER_OPERATOR_EQUAL = 1;
  FILTER_OPERATOR_NOT_EQUAL = 2;
  FILTER_OPERATOR_CONTAINS = 3;
  FILTER_OPERATOR_GREATER_THAN = 4;
  FILTER_OPERATOR_LESS_THAN = 5;
  FILTER_OPERATOR_IN = 6;
}
message GraphFilter {
  string property = 1;
  FilterOperator operator = 2;
  repeated string values = 3;
}
message TraversalStep {
  string link_type = 1;
  string target_type = 2;
  bool reverse = 3;
}
enum SortDirection {
  SORT_DIRECTION_UNSPECIFIED = 0;
  SORT_DIRECTION_ASCENDING = 1;
  SORT_DIRECTION_DESCENDING = 2;
}
message GraphSort {
  string property = 1;
  SortDirection direction = 2;
}
enum AggregationFunction {
  AGGREGATION_FUNCTION_UNSPECIFIED = 0;
  AGGREGATION_FUNCTION_COUNT = 1;
  AGGREGATION_FUNCTION_DISTINCT_COUNT = 2;
  AGGREGATION_FUNCTION_SUM = 3;
  AGGREGATION_FUNCTION_AVERAGE = 4;
  AGGREGATION_FUNCTION_MINIMUM = 5;
  AGGREGATION_FUNCTION_MAXIMUM = 6;
}
message GraphAggregation {
  string property = 1;
  AggregationFunction function = 2;
  string alias = 3;
}
message GraphQuery {
  string workspace_id = 1;
  string ontology_version_id = 2;
  string root_type = 3;
  repeated GraphFilter filters = 4;
  repeated TraversalStep traversal = 5;
  repeated string projection = 6;
  uint32 limit = 7;
  string cursor = 8;
  GraphSort sort = 9;
  repeated GraphAggregation aggregations = 10;
}
message GraphNode {
  string id = 1;
  string object_type = 2;
  string properties_json = 3;
}
message GraphEdge {
  string id = 1;
  string link_type = 2;
  string source_id = 3;
  string target_id = 4;
  string properties_json = 5;
}
message QueryGraphResponse {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
  string next_cursor = 3;
  bool truncated = 4;
  repeated GraphAggregationResult aggregation_results = 5;
}
message GraphAggregationResult {
  string alias = 1;
  string value_json = 2;
}
message GetObjectRequest {
  string workspace_id = 1;
  string ontology_version_id = 2;
  string object_type = 3;
  string id = 4;
}
message GetObjectProvenanceRequest {
  string workspace_id = 1;
  string ontology_version_id = 2;
  string object_type = 3;
  string id = 4;
}
message PropertyProvenance {
  string property = 1;
  string data_source_id = 2;
  string data_source_name = 3;
  string source_field = 4;
  string ontology_mapping_id = 5;
  string ontology_mapping_name = 6;
  string ingestion_job_id = 7;
  google.protobuf.Timestamp imported_at = 8;
}
message GetObjectProvenanceResponse { repeated PropertyProvenance properties = 1; }
message ExpandGraphRequest {
  string workspace_id = 1;
  string ontology_version_id = 2;
  string object_type = 3;
  string object_id = 4;
  repeated string link_types = 5;
  uint32 limit = 6;
}

service GraphService {
  rpc Query(GraphQuery) returns (QueryGraphResponse);
  rpc GetObject(GetObjectRequest) returns (GraphNode);
  rpc Expand(ExpandGraphRequest) returns (QueryGraphResponse);
  rpc GetObjectProvenance(GetObjectProvenanceRequest) returns (GetObjectProvenanceResponse);
}
