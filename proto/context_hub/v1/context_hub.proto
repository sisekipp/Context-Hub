syntax = "proto3";

package context_hub.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message Workspace {
  string id = 1;
  string name = 2;
  string slug = 3;
}

message GetWorkspaceRequest { string id = 1; }
message ListWorkspacesResponse { repeated Workspace workspaces = 1; }

service WorkspaceService {
  rpc GetWorkspace(GetWorkspaceRequest) returns (Workspace);
  rpc ListWorkspaces(google.protobuf.Empty) returns (ListWorkspacesResponse);
}

message OntologyDraft {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  string slug = 4;
  uint64 revision = 5;
  string definition_json = 6;
  string layout_json = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message Ontology {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  string slug = 4;
  string active_version_id = 5;
  uint64 revision = 6;
}

message OntologyVersion {
  string id = 1;
  string ontology_id = 2;
  uint64 version = 3;
  string definition_json = 4;
  string checksum = 5;
  bool active = 6;
  google.protobuf.Timestamp published_at = 7;
}

message GetOntologyDraftRequest { string id = 1; }
message SaveOntologyDraftRequest {
  OntologyDraft draft = 1;
  uint64 expected_revision = 2;
}
message ValidateOntologyRequest { string definition_json = 1; }
message ValidationIssue {
  string path = 1;
  string code = 2;
  string message = 3;
}
message ValidateOntologyResponse {
  bool valid = 1;
  repeated ValidationIssue issues = 2;
}
message PublishOntologyRequest {
  string ontology_id = 1;
  uint64 expected_revision = 2;
}
message ListOntologyVersionsRequest { string ontology_id = 1; }
message ListOntologyVersionsResponse { repeated OntologyVersion versions = 1; }
message ListOntologiesRequest { string workspace_id = 1; }
message ListOntologiesResponse { repeated Ontology ontologies = 1; }
message CreateOntologyRequest {
  string workspace_id = 1;
  string name = 2;
  string slug = 3;
}

service OntologyService {
  rpc Create(CreateOntologyRequest) returns (Ontology);
  rpc List(ListOntologiesRequest) returns (ListOntologiesResponse);
  rpc GetDraft(GetOntologyDraftRequest) returns (OntologyDraft);
  rpc SaveDraft(SaveOntologyDraftRequest) returns (OntologyDraft);
  rpc Validate(ValidateOntologyRequest) returns (ValidateOntologyResponse);
  rpc Publish(PublishOntologyRequest) returns (OntologyVersion);
  rpc ListVersions(ListOntologyVersionsRequest) returns (ListOntologyVersionsResponse);
}

enum DataSourceKind {
  DATA_SOURCE_KIND_UNSPECIFIED = 0;
  DATA_SOURCE_KIND_UPLOAD = 1;
  DATA_SOURCE_KIND_REST = 2;
  DATA_SOURCE_KIND_GRAPHQL = 3;
}

message DataSource {
  reserved 6;
  reserved "mapping_plan_json";
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  DataSourceKind kind = 4;
  string configuration_json = 5;
}
message ListDataSourcesRequest { string workspace_id = 1; }
message ListDataSourcesResponse { repeated DataSource data_sources = 1; }
message SaveDataSourceRequest { DataSource data_source = 1; }

enum SourceFileFormat {
  SOURCE_FILE_FORMAT_UNSPECIFIED = 0;
  SOURCE_FILE_FORMAT_JSON = 1;
  SOURCE_FILE_FORMAT_NDJSON = 2;
  SOURCE_FILE_FORMAT_CSV = 3;
}
message UploadDataSourceRequest {
  string workspace_id = 1;
  string name = 2;
  string file_name = 3;
  SourceFileFormat format = 4;
  bytes content = 5;
}
message UploadDataSourceResponse {
  DataSource data_source = 1;
  string object_key = 2;
  uint64 size_bytes = 3;
  string sha256 = 4;
}

message OntologyDataMapping {
  string id = 1;
  string workspace_id = 2;
  string ontology_id = 3;
  string data_source_id = 4;
  string name = 5;
  string mapping_plan_json = 6;
  uint64 revision = 7;
}
message SaveOntologyDataMappingRequest { OntologyDataMapping mapping = 1; }
message ListOntologyDataMappingsRequest {
  string workspace_id = 1;
  string ontology_id = 2;
}
message ListOntologyDataMappingsResponse { repeated OntologyDataMapping mappings = 1; }

service DataSourceService {
  rpc Save(SaveDataSourceRequest) returns (DataSource);
  rpc Upload(UploadDataSourceRequest) returns (UploadDataSourceResponse);
  rpc List(ListDataSourcesRequest) returns (ListDataSourcesResponse);
  rpc SaveMapping(SaveOntologyDataMappingRequest) returns (OntologyDataMapping);
  rpc ListMappings(ListOntologyDataMappingsRequest) returns (ListOntologyDataMappingsResponse);
}

enum IngestionState {
  INGESTION_STATE_UNSPECIFIED = 0;
  INGESTION_STATE_QUEUED = 1;
  INGESTION_STATE_RUNNING = 2;
  INGESTION_STATE_SUCCEEDED = 3;
  INGESTION_STATE_FAILED = 4;
  INGESTION_STATE_CANCELLED = 5;
}

message IngestionJob {
  string id = 1;
  string data_source_id = 2;
  IngestionState state = 3;
  uint64 rows_read = 4;
  uint64 nodes_written = 5;
  uint64 edges_written = 6;
  uint64 rows_rejected = 7;
  string error = 8;
  string ontology_mapping_id = 9;
  string ontology_version_id = 10;
  string workspace_id = 11;
}
message StartIngestionRequest {
  string data_source_id = 1;
  string ontology_mapping_id = 2;
  string ontology_version_id = 3;
}
message GetIngestionJobRequest { string id = 1; }

// Internal worker boundary: records have already been validated and transformed by the
// MappingPlan/DataFusion pipeline before this bounded graph batch is persisted.
message ImportGraphRequest {
  string data_source_id = 1;
  string ontology_mapping_id = 2;
  string ontology_version_id = 3;
  repeated GraphNode nodes = 4;
  repeated GraphEdge edges = 5;
}

service IngestionService {
  rpc Start(StartIngestionRequest) returns (IngestionJob);
  rpc ImportGraph(ImportGraphRequest) returns (IngestionJob);
  rpc GetJob(GetIngestionJobRequest) returns (IngestionJob);
}

enum FilterOperator {
  FILTER_OPERATOR_UNSPECIFIED = 0;
  FILTER_OPERATOR_EQUAL = 1;
  FILTER_OPERATOR_NOT_EQUAL = 2;
  FILTER_OPERATOR_CONTAINS = 3;
  FILTER_OPERATOR_GREATER_THAN = 4;
  FILTER_OPERATOR_LESS_THAN = 5;
  FILTER_OPERATOR_IN = 6;
}
message GraphFilter {
  string property = 1;
  FilterOperator operator = 2;
  repeated string values = 3;
}
message TraversalStep {
  string link_type = 1;
  string target_type = 2;
  bool reverse = 3;
}
message GraphQuery {
  string workspace_id = 1;
  string ontology_version_id = 2;
  string root_type = 3;
  repeated GraphFilter filters = 4;
  repeated TraversalStep traversal = 5;
  repeated string projection = 6;
  uint32 limit = 7;
  string cursor = 8;
}
message GraphNode {
  string id = 1;
  string object_type = 2;
  string properties_json = 3;
}
message GraphEdge {
  string id = 1;
  string link_type = 2;
  string source_id = 3;
  string target_id = 4;
  string properties_json = 5;
}
message QueryGraphResponse {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
  string next_cursor = 3;
  bool truncated = 4;
}
message GetObjectRequest {
  string workspace_id = 1;
  string ontology_version_id = 2;
  string object_type = 3;
  string id = 4;
}

service GraphService {
  rpc Query(GraphQuery) returns (QueryGraphResponse);
  rpc GetObject(GetObjectRequest) returns (GraphNode);
}
