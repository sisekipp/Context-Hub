services:
  workspace:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    volumes:
      - .:/workspace:cached
      - root-node-modules:/workspace/node_modules
      - web-node-modules:/workspace/apps/web/node_modules
      - web-next-cache:/workspace/apps/web/.next
      - cargo-cache:/usr/local/cargo/registry
      - pnpm-cache:/pnpm/store
    environment:
      AUTH_MODE: dev
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: context_hub
      CLICKHOUSE_USER: context_hub
      CLICKHOUSE_PASSWORD: context_hub
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: context-hub
      S3_ACCESS_KEY: context_hub
      S3_SECRET_KEY: context_hub_dev_secret
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    environment:
      CLICKHOUSE_DB: context_hub
      CLICKHOUSE_USER: context_hub
      CLICKHOUSE_PASSWORD: context_hub
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "context_hub", "--password", "context_hub", "--query", "SELECT 1"]
      interval: 3s
      timeout: 3s
      retries: 20

  clickhouse-init:
    image: clickhouse/clickhouse-server:25.8
    depends_on:
      clickhouse:
        condition: service_healthy
    entrypoint: ["clickhouse-client"]
    command: ["--host", "clickhouse", "--user", "context_hub", "--password", "context_hub", "--multiquery", "--queries-file", "/migrations/001_graph.sql"]
    volumes:
      - ./infra/clickhouse:/migrations:ro

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: context_hub
      MINIO_ROOT_PASSWORD: context_hub_dev_secret
    ports:
      - "9002:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing local/context-hub
    environment:
      MINIO_ROOT_USER: context_hub
      MINIO_ROOT_PASSWORD: context_hub_dev_secret

volumes:
  root-node-modules:
  web-node-modules:
  web-next-cache:
  cargo-cache:
  pnpm-cache:
  clickhouse-data:
  minio-data:
